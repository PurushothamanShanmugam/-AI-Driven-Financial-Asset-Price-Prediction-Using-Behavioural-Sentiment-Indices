name: CI — AI Financial Behavior Project

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:

  # ── Lint & syntax check ────────────────────────────────────────────────────
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8 pyflakes

      - name: Run flake8 (src/)
        run: |
          flake8 src/ \
            --max-line-length=120 \
            --ignore=E501,W503,E203 \
            --exclude=__pycache__

      - name: Run flake8 (tests/)
        run: |
          flake8 tests/ \
            --max-line-length=120 \
            --ignore=E501,W503,E203 \
            --exclude=__pycache__

      - name: Syntax check all Python files
        run: |
          python -m py_compile src/config.py
          python -m py_compile src/data_loader.py
          python -m py_compile src/preprocess.py
          python -m py_compile src/modeling.py
          python -m py_compile src/pipeline.py
          python -m py_compile src/analysis.py
          python -m py_compile main.py
          python -m py_compile validate_new_dataset.py
          echo "All syntax checks passed"

  # ── Unit tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests (modeling + pipeline, no data required)
        run: |
          python -m pytest tests/test_modeling.py tests/test_pipeline.py \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Integration tests (requires raw data) ─────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Check raw data files present
        id: check_data
        run: |
          if ls data/raw/*.csv 1>/dev/null 2>&1; then
            echo "data_present=true" >> $GITHUB_OUTPUT
          else
            echo "data_present=false" >> $GITHUB_OUTPUT
            echo "Raw data files not found — skipping integration tests"
          fi

      - name: Run data loader + preprocess tests
        if: steps.check_data.outputs.data_present == 'true'
        run: |
          python -m pytest tests/test_data_loader.py tests/test_preprocess.py \
            tests/test_validate_new_dataset.py \
            -v --tb=short

      - name: Skip integration tests (no data)
        if: steps.check_data.outputs.data_present == 'false'
        run: echo "Skipped — raw CSV data not available in CI environment"

  # ── Docker build ───────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-financial-behavior:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify entrypoint.sh is executable
        run: |
          docker run --rm \
            -e APP_MODE=test \
            ai-financial-behavior:ci \
            ls -la /entrypoint.sh

  # ── Security scan ─────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install safety
        run: pip install safety

      - name: Check dependencies for known vulnerabilities
        run: |
          pip install -r requirements.txt
          safety check --full-report || true   # warn but don't fail build