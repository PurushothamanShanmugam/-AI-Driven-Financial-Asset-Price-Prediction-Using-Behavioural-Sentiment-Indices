name: CD — Build & Push Docker Image

on:
  push:
    tags:
      - "v*.*.*"    # triggers on version tags like v1.0.0, v2.1.3

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Build & Push to Docker Hub
  # ══════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/ai-financial-behavior
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # ── FIX: step id is "push" so digest uses steps.push.outputs.digest ──
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── FIX: was steps.build.outputs.digest — wrong step id ──────────────
      - name: Print image digest
        run: |
          echo "✅ Image pushed successfully"
          echo "Tags:   ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.push.outputs.digest }}"

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Notify on success (optional — remove if not needed)
  # ══════════════════════════════════════════════════════════════════════════
  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()

    steps:
      - name: Print release summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  SentiPrice — Docker release complete"
          echo "  Tag:    ${{ github.ref_name }}"
          echo "  Repo:   ${{ github.repository }}"
          echo "  Run:    ${{ github.run_id }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
